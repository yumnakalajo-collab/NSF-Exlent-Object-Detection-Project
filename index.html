<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INDEX-V — live object detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0b0e0f;
    --panel: #121617;
    --panel-border: #232a2c;
    --ink: #edefec;
    --ink-dim: #8b9594;
    --signal: #5effb0;
    --signal-dim: #2c5d44;
    --idle: #ffb13c;
    --error: #ff6b5e;
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    min-height: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    padding: clamp(16px, 4vw, 48px);
  }

  .app {
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
  }

  header.masthead {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }

  .masthead .wordmark {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.02em;
  }
  .masthead .wordmark span { color: var(--signal); }

  .masthead .project {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-dim);
  }

  .viewfinder-wrap {
    position: relative;
  }

  .viewfinder {
    position: relative;
    aspect-ratio: 1 / 1;
    background: #000;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
    isolation: isolate;
  }

  .viewfinder video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .viewfinder canvas#overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 34px;
    height: 34px;
    border: 2px solid var(--ink-dim);
    opacity: 0.55;
    z-index: 3;
    transition: border-color 0.4s ease, opacity 0.4s ease;
  }
  .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
  .corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
  .corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
  .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-radius: 0 0 6px 0; }

  .viewfinder.is-live .corner {
    border-color: var(--signal);
    opacity: 0.9;
  }

  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--signal), transparent);
    opacity: 0;
    z-index: 2;
  }
  .viewfinder.is-live .scanline {
    opacity: 0.5;
    animation: sweep 2s linear infinite;
  }
  @keyframes sweep {
    0% { top: 6%; }
    50% { top: 94%; }
    100% { top: 6%; }
  }

  .placeholder-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 4;
    background: radial-gradient(circle at 50% 40%, rgba(94,255,176,0.07), transparent 60%);
    padding: 24px;
    text-align: center;
  }

  .viewfinder.is-live .placeholder-state { display: none; }

  .placeholder-state p {
    color: var(--ink-dim);
    max-width: 320px;
    font-size: 14px;
    margin: 0;
  }

  button.primary {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color
