<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>INDEX-V — live object detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #090c0d;
    --panel: #13191b;
    --panel-border: #212c2f;
    --ink: #f1f4f3;
    --ink-dim: #909d9c;
    --signal: #5effb0;
    --signal-dim: #1e3d2f;
    --idle: #ffb13c;
    --error: #ff6b5e;
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
  }

  .app-container {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    height: 100vh;
  }

  main {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  aside {
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .panel:hover {
    border-color: #2c3c40;
  }

  .viewfinder-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--panel-border);
  }

  video, canvas#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  canvas#overlay {
    z-index: 2;
    pointer-events: none;
  }

  .controls {
    display: flex;
    gap: 12px;
  }

  button.btn {
    background: #1c2427;
    border: 1px solid var(--panel-border);
    color: var(--ink);
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font-ui);
    transition: all 0.2s ease;
  }

  button.btn:hover {
    background: #253034;
    border-color: #37474d;
  }

  button.btn.primary {
    background: var(--signal);
    color: #090c0d;
    border: none;
    font-weight: 600;
  }

  button.btn.primary:hover {
    background: #4ee09b;
    box-shadow: 0 0 12px rgba(94, 255, 176, 0.3);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .status-dot.active { background: var(--signal); box-shadow: 0 0 8px var(--signal); }
  .status-dot.idle { background: var(--idle); box-shadow: 0 0 8px var(--idle); }
  .status-dot.error { background: var(--error); box-shadow: 0 0 8px var(--error); }

  /* Chat styles */
  .chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .chat-status-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.3);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--signal);
    border: 1px solid rgba(94, 255, 176, 0.2);
    cursor: pointer;
    user-select: none;
    transition: all 0.2s ease;
  }

  .chat-status-toggle.offline {
    color: var(--error);
    border-color: rgba(255, 107, 94, 0.2);
  }

  .chat-status-toggle .dot {
    width: 7px;
    height: 7px;
    background: var(--signal);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--signal);
  }

  .chat-status-toggle.offline .dot {
    background: var(--error);
    box-shadow: 0 0 6px var(--error);
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 300px;
    overflow-y: auto;
    padding: 8px 4px;
    border-bottom: 1px solid var(--panel-border);
    margin-bottom: 12px;
  }

  .chat-empty {
    color: var(--ink-dim);
    font-size: 14px;
    text-align: center;
    margin-top: auto;
    margin-bottom: auto;
    padding: 40px 0;
  }

  .chat-msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }

    align-self: flex-end;
    background: var(--signal-dim);
    color: var(--signal);
    border-bottom-right-radius: 4px;
